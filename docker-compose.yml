services:
  iris:
    image: ${IRIS_IMAGE:-intersystems/irishealth-community:latest-cd}
    environment:
      ISC_DATA_DIRECTORY: /home/irisowner/irisdata
      ISC_CPF_FILE_NAME: /home/irisowner/iris.cpf
      MEDSENT_NAMESPACE: ${IRIS_NAMESPACE:-MEDSENT}
      MEDSENT_APP_USER: ${IRIS_USER:-medsent_app}
      MEDSENT_APP_PASSWORD: ${IRIS_PASSWORD:-changeme}
      MEDSENT_FHIR_PATH: ${MEDSENT_FHIR_PATH:-/fhir/r4}
      MEDSENT_FHIR_METADATA_PACKAGE: ${MEDSENT_FHIR_METADATA_PACKAGE:-hl7.fhir.r4.core@4.0.1}
      MEDSENT_FHIR_STRATEGY_CLASS: ${MEDSENT_FHIR_STRATEGY_CLASS:-HS.FHIRServer.Storage.Json.InteractionsStrategy}
      MEDSENT_SERVER_NAME: ${MEDSENT_SERVER_NAME:-MedSentinelFHIR}
      MEDSENT_WALLET_COLLECTION: ${MEDSENT_WALLET_COLLECTION:-MedSentinel}
    volumes:
      - ./iris/iris.cpf:/home/irisowner/iris.cpf:ro
      - ./iris/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./iris/MedSentinelInstaller.cls:/docker-entrypoint-initdb.d/MedSentinelInstaller.cls:ro
      - ./iris/fhir_config.json:/docker-entrypoint-initdb.d/fhir_config.json:ro
    ports:
      - "1972:1972"
      - "52773:52773"
    networks:
      - internal
    healthcheck:
      # IRIS is ready when the management portal returns HTTP 200
      test: ["CMD-SHELL", "curl -sf http://localhost:52773/api/mgmnt/ -o /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      # Override localhost defaults from .env.example with Docker service hostnames
      IRIS_HOST: iris
      IRIS_FHIR_BASE: http://iris:52773/${MEDSENT_FHIR_PATH:-fhir/r4}
    volumes:
      - .:/app
    depends_on:
      iris:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    networks:
      - internal

networks:
  internal:
    driver: bridge
